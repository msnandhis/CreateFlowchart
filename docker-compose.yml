services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: createflowchart-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: createflowchart
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: createflowchart-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  realtime:
    build:
      context: .
      dockerfile: apps/realtime/Dockerfile
    container_name: createflowchart-realtime
    ports:
      - "1234:1234"
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=1234
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: createflowchart-web
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/createflowchart
      - REDIS_URL=redis://redis:6379
      - REALTIME_URL=ws://realtime:1234
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - BETTER_AUTH_SECRET=your-secret-key-change-in-production
      - BETTER_AUTH_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      realtime:
        condition: service_started
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
